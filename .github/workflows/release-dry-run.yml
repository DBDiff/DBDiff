name: Release Dry Run

# ─── Trigger ────────────────────────────────────────────────────────────────
# Manual dispatch from any branch.  Optionally supply a PR number to post the
# build report as a comment on that PR.
#
# Validates the full release pipeline WITHOUT publishing anything:
#   1. PHAR build
#   2. All 7 platform binaries (Linux glibc/musl, macOS, Windows)
#   3. npm pack + dry-run publish for every @dbdiff/* package
#   4. npm registry reachability check (detects tombstones before real publish)
#   5. Summary posted to GitHub Actions + PR comment (if PR number given)
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to post results comment (optional)'
        required: false
        default: ''
      version:
        description: 'Version to stamp (default: 0.0.0-dry-run)'
        required: false
        default: '0.0.0-dry-run'

env:
  SPC_EXTENSIONS: "phar,filter,pdo_mysql,pdo_pgsql,pdo_sqlite,openssl,zlib,mbstring,dom,libxml,tokenizer,ctype,json,iconv"
  SPC_LIBS: "libiconv,libxml2,ncurses,libedit,postgresql,sqlite"
  SPC_WINDOWS_LIBS: "zlib,libiconv-win,libxml2,postgresql-win,sqlite"
  SPC_PHP_VERSION: "8.3"
  DRY_RUN_VERSION: ${{ inputs.version || '0.0.0-dry-run' }}

# ═══════════════════════════════════════════════════════════════════════════
# JOB 1 — Build PHAR
# ═══════════════════════════════════════════════════════════════════════════
jobs:
  build-phar:
    name: "PHAR"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp version constant
        run: |
          printf '<?php\nnamespace DBDiff;\nconst VERSION = '\''%s'\'';\n' '${{ env.DRY_RUN_VERSION }}' > src/Version.php

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.SPC_PHP_VERSION }}
          extensions: phar, openssl, zlib
          tools: composer
          ini-values: phar.readonly=0

      - name: Download Box
        run: |
          curl -sSL \
            https://github.com/box-project/box/releases/latest/download/box.phar \
            -o /usr/local/bin/box
          chmod +x /usr/local/bin/box

      - name: Install production Composer dependencies
        run: composer install --no-dev --no-scripts --optimize-autoloader

      - name: Build PHAR with Box
        run: box compile

      - name: Smoke-test PHAR
        run: php dist/dbdiff.phar --version

      - uses: actions/upload-artifact@v4
        with:
          name: dbdiff-phar
          path: dist/dbdiff.phar
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Full platform binary matrix (same as release.yml)
  # ═══════════════════════════════════════════════════════════════════════════
  build-binary:
    name: "Binary — ${{ matrix.target }}"
    needs: build-phar

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            artifact: dbdiff-linux-x64
          - target: linux-arm64
            os: ubuntu-24.04-arm
            artifact: dbdiff-linux-arm64
          - target: linux-x64-musl
            os: ubuntu-latest
            artifact: dbdiff-linux-x64-musl
          - target: linux-arm64-musl
            os: ubuntu-24.04-arm
            artifact: dbdiff-linux-arm64-musl
          - target: darwin-x64
            os: macos-15-intel
            artifact: dbdiff-darwin-x64
          - target: darwin-arm64
            os: macos-latest
            artifact: dbdiff-darwin-arm64
          - target: win32-x64
            os: windows-latest
            artifact: dbdiff-win32-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dbdiff-phar
          path: dist/

      # ── SPC build cache (per-platform) ──────────────────────────────────
      - name: Cache SPC build artifacts
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: spc-cache
          key: spc-dryrun-${{ matrix.target }}-php${{ env.SPC_PHP_VERSION }}-${{ hashFiles('.github/workflows/release-dry-run.yml') }}
          restore-keys: |
            spc-dryrun-${{ matrix.target }}-php${{ env.SPC_PHP_VERSION }}-

      - name: Cache SPC build artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: spc-cache
          key: spc-dryrun-${{ matrix.target }}-php${{ env.SPC_PHP_VERSION }}-${{ hashFiles('.github/workflows/release-dry-run.yml') }}
          restore-keys: |
            spc-dryrun-${{ matrix.target }}-php${{ env.SPC_PHP_VERSION }}-

      # ── Unix build ──────────────────────────────────────────────────────
      - name: Download SPC (Unix)
        if: runner.os != 'Windows'
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)    SPC_TARBALL="spc-linux-x86_64.tar.gz" ;;
            Linux-ARM64)  SPC_TARBALL="spc-linux-aarch64.tar.gz" ;;
            macOS-X64)    SPC_TARBALL="spc-macos-x86_64.tar.gz" ;;
            macOS-ARM64)  SPC_TARBALL="spc-macos-aarch64.tar.gz" ;;
          esac
          curl -fsSL \
            "https://github.com/crazywhalecc/static-php-cli/releases/latest/download/${SPC_TARBALL}" \
            | tar xz
          chmod +x spc

      - name: Allow sudo for SPC doctor (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "$USER ALL=(ALL) NOPASSWD: ALL" | sudo tee -a /etc/sudoers

      - name: Build static PHP binary (Unix)
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Restore cache if available
          if [ -d spc-cache/buildroot ] && [ -f spc-cache/buildroot/bin/micro.sfx ]; then
            echo "Cache hit — restoring buildroot"
            cp -a spc-cache/buildroot buildroot
          fi
          if [ -d spc-cache/downloads ]; then
            chmod -R u+w spc-cache/downloads
            cp -a spc-cache/downloads downloads
          fi

          ./spc doctor --auto-fix

          if [ -f buildroot/bin/micro.sfx ]; then
            echo "Cache hit — reusing micro.sfx"
          else
            ./spc download \
              "php-src,micro,${{ env.SPC_EXTENSIONS }},${{ env.SPC_LIBS }}" \
              --with-php="${{ env.SPC_PHP_VERSION }}"
            ./spc build "${{ env.SPC_EXTENSIONS }}" --build-micro
          fi

          # Save to cache
          mkdir -p spc-cache
          [ -d spc-cache/buildroot ] && chmod -R u+w spc-cache/buildroot
          [ -d spc-cache/downloads ] && chmod -R u+w spc-cache/downloads
          cp -a buildroot spc-cache/buildroot
          [ -d downloads ] && cp -a downloads spc-cache/downloads

      - name: Combine PHP + PHAR → binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cat buildroot/bin/micro.sfx dist/dbdiff.phar > dbdiff
          chmod +x dbdiff

      # ── Windows build ──────────────────────────────────────────────────
      - name: Download SPC (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/crazywhalecc/static-php-cli/releases/latest/download/spc-windows-x64.exe" -OutFile spc.exe

      - name: Build static PHP binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\spc.exe doctor --auto-fix
          New-Item -ItemType Directory -Force -Path source | Out-Null
          .\spc.exe download "php-src,micro,${{ env.SPC_EXTENSIONS }},${{ env.SPC_WINDOWS_LIBS }}" --with-php="${{ env.SPC_PHP_VERSION }}"
          .\spc.exe build "${{ env.SPC_EXTENSIONS }}" --build-micro --debug --without-micro-ext-test

      - name: Combine PHP + PHAR → binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $phpBytes  = [IO.File]::ReadAllBytes("buildroot\bin\micro.sfx")
          $pharBytes = [IO.File]::ReadAllBytes("dist\dbdiff.phar")
          [IO.File]::WriteAllBytes("dbdiff.exe", $phpBytes + $pharBytes)

      # ── Smoke-test ──────────────────────────────────────────────────────
      - name: Smoke-test binary (Unix)
        if: runner.os != 'Windows'
        run: ./dbdiff --version

      - name: Smoke-test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dbdiff.exe --version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dbdiff${{ startsWith(matrix.target, 'win32') && '.exe' || '' }}
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — npm dry-run publish + registry health check
  # ═══════════════════════════════════════════════════════════════════════════
  npm-dry-run:
    name: "npm dry-run publish"
    needs: [build-phar, build-binary]
    if: ${{ !cancelled() && needs.build-phar.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: binaries/
          pattern: dbdiff-*
          merge-multiple: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Inject version into package.json files
        run: |
          VERSION="${{ env.DRY_RUN_VERSION }}"
          for pkg_dir in packages/@dbdiff/cli/ packages/@dbdiff/cli-*/; do
            node -e "
              const fs = require('fs');
              const p = '${pkg_dir}package.json';
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = '${VERSION}';
              if (j.optionalDependencies) {
                for (const k of Object.keys(j.optionalDependencies)) {
                  j.optionalDependencies[k] = '${VERSION}';
                }
              }
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            "
          done

      - name: Copy binaries into platform packages
        run: |
          copy_binary() {
            local src="$1" dst="$2"
            if [ -f "$src" ]; then
              cp "$src" "$dst"
            else
              echo "::warning::Binary not found: $src"
            fi
          }
          copy_binary binaries/dbdiff-linux-x64/dbdiff          packages/@dbdiff/cli-linux-x64/dbdiff
          copy_binary binaries/dbdiff-linux-arm64/dbdiff         packages/@dbdiff/cli-linux-arm64/dbdiff
          copy_binary binaries/dbdiff-linux-x64-musl/dbdiff      packages/@dbdiff/cli-linux-x64-musl/dbdiff
          copy_binary binaries/dbdiff-linux-arm64-musl/dbdiff    packages/@dbdiff/cli-linux-arm64-musl/dbdiff
          copy_binary binaries/dbdiff-darwin-x64/dbdiff          packages/@dbdiff/cli-darwin-x64/dbdiff
          copy_binary binaries/dbdiff-darwin-arm64/dbdiff        packages/@dbdiff/cli-darwin-arm64/dbdiff
          copy_binary binaries/dbdiff-win32-x64/dbdiff.exe       packages/@dbdiff/cli-win32-x64/dbdiff.exe
          chmod +x packages/@dbdiff/cli-*/dbdiff || true

      - name: Bundle PHAR into @dbdiff/cli
        run: cp binaries/dbdiff-phar/dbdiff.phar packages/@dbdiff/cli/dbdiff.phar

      # npm pack --dry-run validates the tarball without uploading.
      # npm publish --dry-run validates the full publish flow against the
      # registry (auth, package name availability, conflicts) without pushing.
      - name: "npm pack + publish --dry-run (all packages)"
        id: npm-dry-run
        run: |
          results_file=$(mktemp)

          do_dry_run() {
            local pkg_dir="$1"
            local pkg_name
            pkg_name=$(node -e "console.log(require('./${pkg_dir}package.json').name)")

            # npm pack --dry-run: validates tarball contents
            echo "::group::📦 npm pack --dry-run: ${pkg_name}"
            if npm pack "${pkg_dir}" --dry-run 2>&1; then
              echo "  ✅ pack OK"
              echo "${pkg_name}|pack|✅ OK" >> "$results_file"
            else
              echo "  ❌ pack FAILED"
              echo "${pkg_name}|pack|❌ Failed" >> "$results_file"
            fi
            echo "::endgroup::"

            # npm publish --dry-run: validates against registry
            echo "::group::🚀 npm publish --dry-run: ${pkg_name}"
            if npm publish "${pkg_dir}" --access public --dry-run 2>&1; then
              echo "  ✅ publish dry-run OK"
              echo "${pkg_name}|publish|✅ OK" >> "$results_file"
            else
              echo "  ❌ publish dry-run FAILED"
              echo "${pkg_name}|publish|❌ Failed" >> "$results_file"
            fi
            echo "::endgroup::"
          }

          # Platform packages
          for pkg_dir in packages/@dbdiff/cli-*/; do
            if [ ! -f "${pkg_dir}dbdiff" ] && [ ! -f "${pkg_dir}dbdiff.exe" ]; then
              pkg_name=$(node -e "console.log(require('./${pkg_dir}package.json').name)")
              echo "${pkg_name}|pack|⏭️ Skipped (no binary)" >> "$results_file"
              echo "${pkg_name}|publish|⏭️ Skipped (no binary)" >> "$results_file"
              continue
            fi
            do_dry_run "$pkg_dir"
          done

          # Root package
          do_dry_run "packages/@dbdiff/cli/"

          echo "results_file=${results_file}" >> "$GITHUB_OUTPUT"
          cat "$results_file"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Check each @dbdiff/* package for tombstone / packument issues on the
      # npm registry.  A 404 or unexpected response is an early warning.
      - name: "npm registry health check (tombstone detection)"
        id: registry-check
        run: |
          health_file=$(mktemp)
          packages=(
            "@dbdiff/cli"
            "@dbdiff/cli-linux-x64"
            "@dbdiff/cli-linux-arm64"
            "@dbdiff/cli-linux-x64-musl"
            "@dbdiff/cli-linux-arm64-musl"
            "@dbdiff/cli-darwin-x64"
            "@dbdiff/cli-darwin-arm64"
            "@dbdiff/cli-win32-x64"
            "@dbdiff/cli-win32-arm64"
          )

          # Also check the org packument for ghost entries
          echo "::group::🔍 Org packument check"
          org_response=$(curl -sS "https://registry.npmjs.org/-/org/dbdiff/package" 2>&1)
          echo "  Org packages: ${org_response}"
          echo "::endgroup::"

          for pkg in "${packages[@]}"; do
            encoded=$(echo "$pkg" | sed 's/@/%40/g; s/\//%2f/g')
            echo "::group::🔍 Registry check: ${pkg}"
            http_code=$(curl -sS -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/${encoded}" 2>&1)
            if [ "$http_code" = "200" ]; then
              echo "  ✅ ${pkg} — registry OK (200)"
              echo "${pkg}|✅ OK (200)" >> "$health_file"
            elif [ "$http_code" = "404" ]; then
              # 404 is expected for never-published packages; check if it was
              # previously published by looking for "unpublished" in response.
              response=$(curl -sS "https://registry.npmjs.org/${encoded}" 2>&1)
              if echo "$response" | grep -qi "unpublish"; then
                echo "  ⚠️ ${pkg} — TOMBSTONE DETECTED (404 + unpublished marker)"
                echo "${pkg}|🪦 Tombstone (contact npm support)" >> "$health_file"
              else
                echo "  ℹ️ ${pkg} — not on registry yet (404, clean)"
                echo "${pkg}|ℹ️ Not published yet (clean 404)" >> "$health_file"
              fi
            elif [ "$http_code" = "409" ]; then
              echo "  ❌ ${pkg} — CONFLICT (409, likely tombstone)"
              echo "${pkg}|🪦 Conflict/Tombstone (contact npm support)" >> "$health_file"
            else
              echo "  ⚠️ ${pkg} — unexpected HTTP ${http_code}"
              echo "${pkg}|⚠️ HTTP ${http_code}" >> "$health_file"
            fi
            echo "::endgroup::"
          done

          echo "health_file=${health_file}" >> "$GITHUB_OUTPUT"
          cat "$health_file"

      - name: Build summary
        id: summary
        run: |
          {
            echo 'report<<REPORT_EOF'
            echo "## 🔒 Release Dry Run — \`${{ env.DRY_RUN_VERSION }}\`"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\`  "
            echo "**Commit:** \`${{ github.sha }}\`  "
            echo "**Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""

            # Binary build results from matrix
            echo "### 🏗️ Binary Builds"
            echo ""
            echo "| Platform | Status |"
            echo "|----------|--------|"
            targets=("linux-x64" "linux-arm64" "linux-x64-musl" "linux-arm64-musl" "darwin-x64" "darwin-arm64" "win32-x64")
            for target in "${targets[@]}"; do
              if [ -d "binaries/dbdiff-${target}" ]; then
                echo "| ${target} | ✅ Built |"
              else
                echo "| ${target} | ❌ Missing |"
              fi
            done
            echo ""

            # npm dry-run results
            echo "### 📦 npm Dry Run"
            echo ""
            echo "| Package | Pack | Publish |"
            echo "|---------|------|---------|"
            # Collect unique package names preserving order
            results_file="${{ steps.npm-dry-run.outputs.results_file }}"
            if [ -f "$results_file" ]; then
              # Get unique packages in order
              pkgs=$(awk -F'|' '{print $1}' "$results_file" | awk '!seen[$0]++')
              while IFS= read -r pkg; do
                pack_result=$(grep "^${pkg}|pack|" "$results_file" | head -1 | cut -d'|' -f3)
                pub_result=$(grep "^${pkg}|publish|" "$results_file" | head -1 | cut -d'|' -f3)
                echo "| \`${pkg}\` | ${pack_result} | ${pub_result} |"
              done <<< "$pkgs"
            fi
            echo ""

            # Registry health
            echo "### 🔍 npm Registry Health"
            echo ""
            echo "| Package | Status |"
            echo "|---------|--------|"
            health_file="${{ steps.registry-check.outputs.health_file }}"
            if [ -f "$health_file" ]; then
              while IFS='|' read -r pkg status; do
                echo "| \`${pkg}\` | ${status} |"
              done < "$health_file"
            fi
            echo ""

            echo "### 🏢 Org Packument"
            echo ""
            echo '```json'
            curl -sS "https://registry.npmjs.org/-/org/dbdiff/package" 2>/dev/null || echo "{}"
            echo ""
            echo '```'
            echo ""
            echo "> If any package shows 🪦 **Tombstone**, contact [npm support](https://www.npmjs.com/support) to clear the orphaned packument before running a real release."

            echo 'REPORT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post summary to GitHub Actions
        run: |
          cat << 'EOF' >> "$GITHUB_STEP_SUMMARY"
          ${{ steps.summary.outputs.report }}
          EOF

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — Post results as PR comment (optional)
  # ═══════════════════════════════════════════════════════════════════════════
  pr-comment:
    name: "Post PR comment"
    needs: [build-binary, npm-dry-run]
    if: ${{ !cancelled() && inputs.pr_number != '' }}
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries/
          pattern: dbdiff-*
          merge-multiple: false

      - name: Build comment body
        id: body
        run: |
          {
            echo 'comment<<COMMENT_EOF'
            echo "## 🔒 Release Dry Run — \`${{ env.DRY_RUN_VERSION }}\`"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\`  "
            echo "**Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "### 🏗️ Binary Builds"
            echo ""
            echo "| Platform | Status |"
            echo "|----------|--------|"
            targets=("linux-x64" "linux-arm64" "linux-x64-musl" "linux-arm64-musl" "darwin-x64" "darwin-arm64" "win32-x64")
            for target in "${targets[@]}"; do
              if [ -d "binaries/dbdiff-${target}" ]; then
                echo "| ${target} | ✅ Built |"
              else
                echo "| ${target} | ❌ Missing |"
              fi
            done
            echo ""
            echo "### npm Dry Run + Registry Health"
            echo ""
            echo "See the [full report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) in the workflow summary for pack/publish dry-run results and tombstone detection."
            echo ""

            # Overall verdict
            all_built=true
            for target in "${targets[@]}"; do
              if [ ! -d "binaries/dbdiff-${target}" ]; then
                all_built=false
                break
              fi
            done
            npm_ok="${{ needs.npm-dry-run.result }}"

            if [ "$all_built" = true ] && [ "$npm_ok" = "success" ]; then
              echo "> ✅ **All checks passed** — this branch is ready to release."
            else
              echo "> ⚠️ **Some checks failed** — review the workflow run before releasing."
            fi

            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ inputs.pr_number }}
          header: release-dry-run
          message: ${{ steps.body.outputs.comment }}
