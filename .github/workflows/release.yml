name: Release DBDiff

# ─── Trigger ────────────────────────────────────────────────────────────────
# Run this workflow manually from the GitHub UI.
# The version input MUST NOT have a "v" prefix (e.g.  2.0.1  not  v2.0.1).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version — no "v" prefix (e.g. 3.0.0 or 3.0.0-alpha.1 for pre-releases)'
        required: true

# ─── Constants ──────────────────────────────────────────────────────────────
env:
  # Extensions compiled into the static PHP binary.
  # yaml is pure-PHP via symfony/yaml so it is excluded here.
  SPC_EXTENSIONS: "phar,filter,pdo_mysql,pdo_pgsql,pdo_sqlite,openssl,zlib,mbstring,dom,libxml,tokenizer,ctype,json,iconv"
  # Native C library sources SPC must download alongside the extensions (Unix)
  SPC_LIBS: "libiconv,libxml2,ncurses,libedit,postgresql,sqlite"
  # Windows-specific library names. SPC uses pre-built Visual C++ packages for
  # postgresql and libiconv — they must be requested as postgresql-win and
  # libiconv-win; the bare names download the Unix source archives instead and
  # the build then fails with "not downloaded or not locked".
  # ncurses and libedit are Unix-only and must be omitted.
  # zlib must be listed explicitly on Windows (no system zlib; SPC won't add it
  # automatically just because the zlib PHP extension is requested).
  SPC_WINDOWS_LIBS: "zlib,libiconv-win,libxml2,postgresql-win,sqlite"
  SPC_PHP_VERSION: "8.3"

# ═══════════════════════════════════════════════════════════════════════════
# JOB 1 — Build the PHAR once (fast, shared across all platform build jobs)
# ═══════════════════════════════════════════════════════════════════════════
jobs:
  build-phar:
    name: Build PHAR (Box)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for @git-version@ placeholder in box.json
          # Always check out master for build tooling (box.json, humbug/box).
          # The PHP source is overlaid from the release ref below.

      - name: Stamp version constant
        run: |
          printf '<?php\nnamespace DBDiff;\nconst VERSION = '\''%s'\'';\n' '${{ inputs.version }}' > src/Version.php
          echo "Version stamped as ${{ inputs.version }}"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.SPC_PHP_VERSION }}
          extensions: phar, openssl, zlib
          tools: composer
          # Box compiles the PHAR in a subprocess that overrides phar.readonly
          ini-values: phar.readonly=0

      # humbug/box is a build tool, not a project dependency — it is not in
      # require-dev so we download the phar directly from its GitHub release.
      - name: Download Box
        run: |
          curl -sSL \
            https://github.com/box-project/box/releases/latest/download/box.phar \
            -o /usr/local/bin/box
          chmod +x /usr/local/bin/box
          box --version

      - name: Install production Composer dependencies
        run: composer install --no-dev --no-scripts --optimize-autoloader

      - name: Build PHAR with Box
        run: box compile

      - name: Smoke-test PHAR
        run: php dist/dbdiff.phar --version

      - uses: actions/upload-artifact@v4
        with:
          name: dbdiff-phar
          path: dist/dbdiff.phar
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Platform binary matrix
  #
  # linux-x64 / linux-arm64           → native Ubuntu runner, glibc binary
  # linux-x64-musl / linux-arm64-musl → same runners, build inside Alpine container
  # darwin-x64 / darwin-arm64         → native macOS runners
  # win32-x64                          → native Windows x64 runner
  #   (win32-arm64 is excluded — see matrix comment below)
  # ═══════════════════════════════════════════════════════════════════════════
  build-binary:
    name: Binary — ${{ matrix.target }}
    needs: build-phar

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux glibc ───────────────────────────────────────────────────
          - target:   linux-x64
            os:       ubuntu-latest
            musl:     false
            artifact: dbdiff-linux-x64

          - target:   linux-arm64
            os:       ubuntu-24.04-arm
            musl:     false
            artifact: dbdiff-linux-arm64

          # ── Linux musl (Alpine) ───────────────────────────────────────────
          # The build runs inside an Alpine Docker container so the resulting
          # binary is musl-linked.  The host OS still needs to be the right
          # architecture so that `docker run alpine` uses the correct image.
          - target:   linux-x64-musl
            os:       ubuntu-latest
            musl:     true
            artifact: dbdiff-linux-x64-musl

          - target:   linux-arm64-musl
            os:       ubuntu-24.04-arm
            musl:     true
            artifact: dbdiff-linux-arm64-musl

          # ── macOS ─────────────────────────────────────────────────────────
          - target:   darwin-x64
            os:       macos-15-intel     # GitHub Intel (x64) runner — macos-13 was retired
            musl:     false
            artifact: dbdiff-darwin-x64

          - target:   darwin-arm64
            os:       macos-latest       # GitHub ARM64/Apple-Silicon runner
            musl:     false
            artifact: dbdiff-darwin-arm64

          # ── Windows ───────────────────────────────────────────────────────
          # win32-arm64 excluded: SPC hard-codes phpsdk-vs17-x64.bat which
          # passes "x64_amd64" to vcvarsall.bat — invalid on ARM64 hosts.
          # It also always downloads postgresql-16-windows-x64-binaries.zip
          # regardless of runner arch.  Re-add once SPC gains ARM64 support.
          - target:   win32-x64
            os:       windows-latest
            musl:     false
            artifact: dbdiff-win32-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dbdiff-phar
          path: dist/

      # ── Download static-php-cli (SPC) — Unix (Linux + macOS) ────────────────
      # Note: SPC on Linux always uses its own musl cross-compiler toolchain, so
      # the resulting binary is fully static (no glibc/musl dependency at runtime).
      # Both the glibc and musl npm packages receive the identical binary.
      - name: Download SPC (Unix)
        if: runner.os != 'Windows'
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)    SPC_TARBALL="spc-linux-x86_64.tar.gz" ;;
            Linux-ARM64)  SPC_TARBALL="spc-linux-aarch64.tar.gz" ;;
            macOS-X64)    SPC_TARBALL="spc-macos-x86_64.tar.gz" ;;
            macOS-ARM64)  SPC_TARBALL="spc-macos-aarch64.tar.gz" ;;
          esac
          curl -fsSL \
            "https://github.com/crazywhalecc/static-php-cli/releases/latest/download/${SPC_TARBALL}" \
            | tar xz
          chmod +x spc

      # SPC doctor needs sudo on Linux to install the musl cross-compiler
      - name: Allow sudo for SPC doctor (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "$USER ALL=(ALL) NOPASSWD: ALL" | sudo tee -a /etc/sudoers

      # ── Build static PHP micro SAPI (all Unix targets) ────────────────────
      - name: Build static PHP binary (Unix)
        if: runner.os != 'Windows'
        env:
          # Authenticated token prevents GitHub API 403 rate-limit errors that
          # occur on macOS runners after doctor --auto-fix makes many brew/API
          # calls before the spc download step runs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./spc doctor --auto-fix
          ./spc download \
            "php-src,micro,${{ env.SPC_EXTENSIONS }},${{ env.SPC_LIBS }}" \
            --with-php="${{ env.SPC_PHP_VERSION }}"
          ./spc build "${{ env.SPC_EXTENSIONS }}" --build-micro

      # ── Combine static micro SAPI + PHAR → single binary (Unix) ──────────
      - name: Combine PHP + PHAR → binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cat buildroot/bin/micro.sfx dist/dbdiff.phar > dbdiff
          chmod +x dbdiff

      # ── Windows: download SPC, build static PHP, combine ───────────────────
      - name: Download SPC (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Windows SPC is a plain .exe (no tarball)
          $url = "https://github.com/crazywhalecc/static-php-cli/releases/latest/download/spc-windows-x64.exe"
          Invoke-WebRequest -Uri $url -OutFile spc.exe

      - name: Build static PHP binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Run doctor first (mirrors Unix behaviour) so SPC sets up its working
          # directories and any missing prerequisites are auto-installed.
          .\spc.exe doctor --auto-fix
          # Pre-create the source tree that SPC extracts PHP into.
          # SPC uses `7za -so | tar -C source\<name>` which requires the
          # target directory to already exist — failing otherwise with
          # "The system cannot find the path specified."
          New-Item -ItemType Directory -Force -Path source | Out-Null
          .\spc.exe download "php-src,micro,${{ env.SPC_EXTENSIONS }},${{ env.SPC_WINDOWS_LIBS }}" --with-php="${{ env.SPC_PHP_VERSION }}"
          # --without-micro-ext-test: SPC auto-pulls the pgsql extension as a
          # dependency of pdo_pgsql, but the standalone pgsql ext fails its
          # runtime sanity check on Windows (extension_loaded('pgsql') → false).
          # DBDiff only uses pdo_pgsql (via PDO), so skipping the check is safe.
          .\spc.exe build "${{ env.SPC_EXTENSIONS }}" --build-micro --debug --without-micro-ext-test

      - name: Combine PHP + PHAR → binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $phpBytes  = [IO.File]::ReadAllBytes("buildroot\bin\micro.sfx")
          $pharBytes = [IO.File]::ReadAllBytes("dist\dbdiff.phar")
          [IO.File]::WriteAllBytes("dbdiff.exe", $phpBytes + $pharBytes)

      # ── Smoke-test the combined binary ──────────────────────────────────────
      - name: Smoke-test binary (Unix)
        if: runner.os != 'Windows'
        run: ./dbdiff --version

      - name: Smoke-test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dbdiff.exe --version

      # ── Upload platform artifact ────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dbdiff${{ startsWith(matrix.target, 'win32') && '.exe' || '' }}
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Create GitHub Release + git tag
  #
  # Runs as soon as the PHAR succeeds, even if some binary builds failed.
  # The GitHub Release is the primary distribution channel — it must never
  # be blocked by npm registry issues (tombstones, E409 conflicts, etc.).
  # ═══════════════════════════════════════════════════════════════════════════
  github-release:
    name: GitHub Release
    needs: [build-phar, build-binary]
    if: ${{ !cancelled() && needs.build-phar.result == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: binaries/
          pattern: dbdiff-*
          merge-multiple: false

      - name: Detect pre-release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Create git tag
        run: |
          TAG="v${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on origin — skipping"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      # Rename each binary to include its platform so every GitHub Release asset
      # has a unique name (dbdiff-linux-x64, dbdiff-darwin-arm64, dbdiff-win32-x64.exe …).
      - name: Rename binaries to include platform in filename
        run: |
          for dir in binaries/dbdiff-*/; do
            platform="${dir#binaries/dbdiff-}"
            platform="${platform%/}"
            if [ -f "${dir}dbdiff" ]; then
              mv "${dir}dbdiff" "${dir}dbdiff-${platform}"
            elif [ -f "${dir}dbdiff.exe" ]; then
              mv "${dir}dbdiff.exe" "${dir}dbdiff-${platform}.exe"
            fi
          done

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  v${{ github.event.inputs.version }}
          name:      v${{ github.event.inputs.version }}
          generate_release_notes: true
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          make_latest: ${{ env.IS_PRERELEASE != 'true' }}
          files: |
            binaries/dbdiff-*/dbdiff-*
            binaries/dbdiff-phar/dbdiff.phar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — Publish to npm registries
  #
  # Best-effort: npm failures (E409 tombstones, registry outages) do NOT
  # block the GitHub Release.  Individual package failures are logged as
  # warnings but do not abort the remaining publishes.
  #
  # Publishes to:
  #   1. npmjs.org  — primary public registry
  #   2. npm.pkg.github.com — GitHub Packages mirror (same npm protocol;
  #      works with npm, pnpm, yarn, bun via .npmrc or --registry flag)
  # ═══════════════════════════════════════════════════════════════════════════
  publish-npm:
    name: Publish npm packages
    needs: [build-phar, build-binary, github-release]
    if: ${{ !cancelled() && needs.build-phar.result == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write    # required for GitHub Packages
      id-token: write    # required for npm --provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: binaries/
          pattern: dbdiff-*
          merge-multiple: false

      - name: Detect pre-release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_ID="${VERSION#*-}"
            PRERELEASE_ID="${PRERELEASE_ID%%.*}"
            echo "NPM_TAG=${PRERELEASE_ID}" >> "$GITHUB_ENV"
            echo "Pre-release detected — npm tag: ${PRERELEASE_ID}"
          else
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
            echo "Stable release — npm tag: latest"
          fi

      # Stamp the version into every package.json (root + 8 platform packages)
      - name: Inject version into package.json files
        run: |
          VERSION="${{ github.event.inputs.version }}"
          for pkg_dir in packages/@dbdiff/cli/ packages/@dbdiff/cli-*/; do
            node -e "
              const fs = require('fs');
              const p = '${pkg_dir}package.json';
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = '${VERSION}';
              if (j.optionalDependencies) {
                for (const k of Object.keys(j.optionalDependencies)) {
                  j.optionalDependencies[k] = '${VERSION}';
                }
              }
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
              console.log('Updated', p, 'to version', '${VERSION}');
            "
          done

      - name: Copy binaries into platform packages
        run: |
          copy_binary() {
            local src="$1" dst="$2"
            if [ -f "$src" ]; then
              cp "$src" "$dst"
            else
              echo "::warning::Binary not found: $src — skipping npm package for this platform"
            fi
          }
          copy_binary binaries/dbdiff-linux-x64/dbdiff          packages/@dbdiff/cli-linux-x64/dbdiff
          copy_binary binaries/dbdiff-linux-arm64/dbdiff         packages/@dbdiff/cli-linux-arm64/dbdiff
          copy_binary binaries/dbdiff-linux-x64-musl/dbdiff      packages/@dbdiff/cli-linux-x64-musl/dbdiff
          copy_binary binaries/dbdiff-linux-arm64-musl/dbdiff    packages/@dbdiff/cli-linux-arm64-musl/dbdiff
          copy_binary binaries/dbdiff-darwin-x64/dbdiff          packages/@dbdiff/cli-darwin-x64/dbdiff
          copy_binary binaries/dbdiff-darwin-arm64/dbdiff        packages/@dbdiff/cli-darwin-arm64/dbdiff
          copy_binary binaries/dbdiff-win32-x64/dbdiff.exe       packages/@dbdiff/cli-win32-x64/dbdiff.exe
          chmod +x packages/@dbdiff/cli-*/dbdiff || true

      - name: Bundle PHAR into @dbdiff/cli for PHP fallback
        run: cp binaries/dbdiff-phar/dbdiff.phar packages/@dbdiff/cli/dbdiff.phar

      # ── npmjs.org ─────────────────────────────────────────────────────────
      - name: Setup Node (npmjs.org)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish platform packages to npmjs.org
        id: npmjs-platform
        continue-on-error: true
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PHAR_FALLBACK_PKGS="@dbdiff/cli-win32-arm64"
          failed=0
          for pkg_dir in packages/@dbdiff/cli-*/; do
            pkg_name=$(node -e "console.log(require('./${pkg_dir}package.json').name)")
            if [ ! -f "${pkg_dir}dbdiff" ] && [ ! -f "${pkg_dir}dbdiff.exe" ]; then
              if echo "$PHAR_FALLBACK_PKGS" | grep -qw "$pkg_name"; then
                echo "  No binary for ${pkg_name} — publishing as PHAR-fallback skeleton"
              else
                echo "::warning::No binary in ${pkg_dir} — skipping"
                continue
              fi
            fi
            if npm view "${pkg_name}@${VERSION}" version &>/dev/null; then
              echo "  ${pkg_name}@${VERSION} already on registry — skipping"
            else
              echo "Publishing ${pkg_name}@${VERSION} to npmjs.org ..."
              if npm publish "${pkg_dir}" --access public --provenance --tag "$NPM_TAG"; then
                sleep 5
              else
                echo "::warning::Failed to publish ${pkg_name} to npmjs.org (E409 tombstone / registry issue)"
                failed=$((failed + 1))
              fi
            fi
          done
          echo "npm_platform_failed=${failed}" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish root @dbdiff/cli to npmjs.org
        id: npmjs-root
        continue-on-error: true
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if npm view "@dbdiff/cli@${VERSION}" version &>/dev/null; then
            echo "@dbdiff/cli@${VERSION} already on registry — skipping"
          else
            npm publish packages/@dbdiff/cli --access public --provenance --tag "$NPM_TAG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── GitHub Packages (npm.pkg.github.com) ──────────────────────────────
      # Secondary registry — same npm protocol, works with npm/pnpm/yarn/bun.
      # Install from here when npmjs.org has tombstone issues:
      #   npm install @dbdiff/cli --registry=https://npm.pkg.github.com
      - name: Setup Node (GitHub Packages)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dbdiff'

      - name: Publish platform packages to GitHub Packages
        continue-on-error: true
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PHAR_FALLBACK_PKGS="@dbdiff/cli-win32-arm64"
          for pkg_dir in packages/@dbdiff/cli-*/; do
            pkg_name=$(node -e "console.log(require('./${pkg_dir}package.json').name)")
            if [ ! -f "${pkg_dir}dbdiff" ] && [ ! -f "${pkg_dir}dbdiff.exe" ]; then
              if ! echo "$PHAR_FALLBACK_PKGS" | grep -qw "$pkg_name"; then
                continue
              fi
            fi
            echo "Publishing ${pkg_name}@${VERSION} to GitHub Packages ..."
            npm publish "${pkg_dir}" --access public --tag "$NPM_TAG" 2>&1 || \
              echo "::warning::Failed to publish ${pkg_name} to GitHub Packages"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish root @dbdiff/cli to GitHub Packages
        continue-on-error: true
        run: |
          npm publish packages/@dbdiff/cli --access public --tag "$NPM_TAG" 2>&1 || \
            echo "::warning::Failed to publish @dbdiff/cli to GitHub Packages"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize npm publish results
        if: always()
        run: |
          {
            echo "### npm Publish Summary"
            echo ""
            if [ "${{ steps.npmjs-platform.outcome }}" = "success" ] && [ "${{ steps.npmjs-root.outcome }}" = "success" ]; then
              echo "✅ **npmjs.org**: All packages published successfully"
            else
              echo "⚠️ **npmjs.org**: Some packages failed to publish (likely tombstone / E409 — contact npm support)"
            fi
            echo ""
            echo "📦 **GitHub Packages**: Published as fallback registry"
            echo ""
            echo "If npmjs.org is blocked, users can install from GitHub Packages:"
            echo '```'
            echo 'npm install @dbdiff/cli --registry=https://npm.pkg.github.com'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 — Build and push Docker images
  #
  # Two images per release:
  #   slim  → docker/Dockerfile.slim  — PHAR + PHP Alpine (~120 MB)
  #   full  → docker/Dockerfile       — Composer source install (~600 MB)
  #
  # Registry: GHCR — ghcr.io/dbdiff/dbdiff  (uses GITHUB_TOKEN, no extra secrets needed)
  #
  # Tags (slim):  latest, {version}, slim-{version}
  # Tags (full):  full, full-{version}
  #
  # Platforms: linux/amd64 + linux/arm64 (via QEMU for cross-build)
  #
  # Each push step is independent (continue-on-error) so a Docker Hub outage
  # or missing secret does not block GHCR, and vice versa.
  # ═══════════════════════════════════════════════════════════════════════════
  publish-docker:
    name: Publish Docker images
    # Only needs the PHAR — can run in parallel with binary builds
    needs: build-phar
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # Required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download PHAR artifact
        uses: actions/download-artifact@v4
        with:
          name: dbdiff-phar
          path: dist/

      - name: Verify PHAR
        run: |
          echo "::group::PHAR details"
          ls -lh dist/dbdiff.phar
          file dist/dbdiff.phar
          echo "::endgroup::"

      # ── Build infrastructure ──────────────────────────────────────────────
      - name: Set up QEMU (enables arm64 cross-build on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      # ── Registry login ────────────────────────────────────────────────────
      - name: Log in to GHCR
        id: login-ghcr
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Report login result
        run: |
          if [ "${{ steps.login-ghcr.outcome }}" = "success" ]; then
            echo "✅ GHCR login succeeded"
          else
            echo "::warning::❌ GHCR login failed"
          fi

      # ── Slim image (PHAR + PHP Alpine) ────────────────────────────────────
      # Tags: latest, {version}, slim-{version}
      - name: Build and push slim image to GHCR
        id: push-slim-ghcr
        if: steps.login-ghcr.outcome == 'success'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.slim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dbdiff/dbdiff:latest
            ghcr.io/dbdiff/dbdiff:${{ github.event.inputs.version }}
            ghcr.io/dbdiff/dbdiff:slim-${{ github.event.inputs.version }}
          labels: |
            org.opencontainers.image.title=DBDiff
            org.opencontainers.image.description=Database schema and data diff tool — slim (PHAR) image
            org.opencontainers.image.version=${{ github.event.inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/DBDiff/DBDiff
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Full image (Composer + source) ────────────────────────────────────
      # Tags: full, full-{version}
      # Intended for local development and cross-version testing (start.sh)
      - name: Build and push full image to GHCR
        id: push-full-ghcr
        if: steps.login-ghcr.outcome == 'success'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dbdiff/dbdiff:full
            ghcr.io/dbdiff/dbdiff:full-${{ github.event.inputs.version }}
          labels: |
            org.opencontainers.image.title=DBDiff
            org.opencontainers.image.description=Database schema and data diff tool — full (source) image
            org.opencontainers.image.version=${{ github.event.inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/DBDiff/DBDiff
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Final summary (always runs — even if individual pushes failed) ─────
      - name: Docker publish summary
        if: always()
        run: |
          VERSION="${{ github.event.inputs.version }}"
          report() {
            local label="$1" outcome="$2"
            if [ "$outcome" = "success" ]; then
              echo "  ✅ $label"
            elif [ "$outcome" = "skipped" ]; then
              echo "  ⏭️  $label (skipped — login failed)"
            else
              echo "  ❌ $label (FAILED)"
            fi
          }
          echo "::group::Docker publish results"
          echo ""
          echo "  Slim image (latest / ${VERSION} / slim-${VERSION}):"
          report "ghcr.io/dbdiff/dbdiff:latest"     "${{ steps.push-slim-ghcr.outcome }}"
          echo ""
          echo "  Full image (full / full-${VERSION}):"
          report "ghcr.io/dbdiff/dbdiff:full"       "${{ steps.push-full-ghcr.outcome }}"
          echo ""
          echo "  Pull command:"
          echo "    docker pull ghcr.io/dbdiff/dbdiff:${VERSION}"
          echo "::endgroup::"
