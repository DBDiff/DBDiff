name: Batch Close Issues & PRs

on:
  workflow_dispatch:
    inputs:
      batch_file:
        description: 'Path to a batch file in the repo (e.g. scripts/v3-close-batch.txt) OR a single-line entry for a one-off close (e.g. issue|42|bug,fixed|Fixed in PR #157.)'
        required: false
        type: string
      batch_content:
        description: 'TRIGGER FROM LOCAL CLI ONLY — do not use this field from the web UI (newlines are stripped). Run locally: gh workflow run batch-close.yml -f batch_content="$(cat scripts/v3-close-batch.txt)" -f dry_run=true'
        required: false
        type: string
      dry_run:
        description: 'Dry run — preview only, no changes made'
        required: true
        default: true
        type: boolean

permissions:
  issues: write
  pull-requests: write

jobs:
  batch-close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve batch file
        env:
          BATCH_CONTENT: ${{ inputs.batch_content }}
        run: |
          if [[ -n "${{ inputs.batch_file }}" ]]; then
            # Mode 1: file path in repo (web UI or CLI)
            if [[ ! -f "${{ inputs.batch_file }}" ]]; then
              echo "::error::Batch file not found: ${{ inputs.batch_file }}"
              exit 1
            fi
            cp "${{ inputs.batch_file }}" /tmp/batch-close.txt
            echo "source=repo file (${{ inputs.batch_file }})" >> "$GITHUB_ENV"
          elif [[ -n "$BATCH_CONTENT" ]]; then
            # Mode 2: raw content via CLI (gh workflow run -f batch_content="...")
            printf '%s\n' "$BATCH_CONTENT" > /tmp/batch-close.txt
            echo "source=CLI content" >> "$GITHUB_ENV"
          else
            echo "::error::Provide either batch_file (path) or batch_content (raw text)"
            exit 1
          fi
          echo "Batch file lines: $(wc -l < /tmp/batch-close.txt)"
          echo "Non-comment entries: $(grep -cvE '^\s*(#|$)' /tmp/batch-close.txt || true)"

      - name: Validate & Execute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=(--batch-close /tmp/batch-close.txt)
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            ARGS+=(--apply)
          fi
          bash scripts/manage_prs.sh "${ARGS[@]}" 2>&1 | tee /tmp/batch-output.txt
          # Propagate the script exit code
          exit "${PIPESTATUS[0]}"

      - name: Post summary
        if: always()
        run: |
          {
            echo "## Batch Close Results"
            echo "> **Source:** ${{ env.source }}"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "> **Mode:** Dry Run (no changes made)"
            else
              echo "> **Mode:** Apply (changes were made)"
            fi
            echo ""
            echo '```'
            cat /tmp/batch-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
