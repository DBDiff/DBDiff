name: DBDiff Test Suite

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ── Unit tests (no DB needed — fast feedback) ────────────────────────────────
  unit-tests:
    name: Unit / PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: pdo, pdo_sqlite, json
        coverage: none

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run unit tests
      run: ./scripts/run-tests.sh --unit

  # ── MySQL matrix ────────────────────────────────────────────────────────────
  test:
    name: PHP ${{ matrix.php-version }} / MySQL ${{ matrix.mysql-version }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        mysql-version: ['8.0', '8.4', '9.3', '9.6']

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_ROOT_PASSWORD: rootpass
      DB_USER: dbdiff
      DB_PASSWORD: dbdiff

    services:
      mysql:
        image: mysql:${{ matrix.mysql-version }}
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: diff1
          MYSQL_USER: dbdiff
          MYSQL_PASSWORD: dbdiff
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: pdo, pdo_mysql, pdo_sqlite, mysqli, json
        coverage: none

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run comprehensive tests
      run: ./scripts/run-tests.sh
      # End2EndSQLiteTest  → skips when baseline not yet committed (own job below)
      # End2EndPostgresTest → skips because DB_HOST_POSTGRES is unset

  # ── SQLite standalone (no DB service needed) ─────────────────────────────────
  test-sqlite:
    name: PHP ${{ matrix.php-version }} / SQLite e2e
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: pdo, pdo_sqlite, pdo_mysql, json
        coverage: none

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Record SQLite baseline
      run: DBDIFF_RECORD_MODE=true ./scripts/run-tests.sh --sqlite

    - name: Verify SQLite baseline determinism
      run: ./scripts/run-tests.sh --sqlite

  # ── PostgreSQL matrix ────────────────────────────────────────────────────────
  test-postgres:
    name: PHP ${{ matrix.php-version }} / PostgreSQL ${{ matrix.postgres-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        postgres-version: ['14', '15', '16', '17', '18']

    env:
      DB_HOST_POSTGRES: 127.0.0.1
      DB_PORT_POSTGRES: 5432
      DB_ROOT_PASSWORD: rootpass
      DB_USER: dbdiff
      DB_PASSWORD: dbdiff

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_PASSWORD: rootpass
          POSTGRES_USER: dbdiff
          POSTGRES_DB: diff1
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dbdiff"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: pdo, pdo_pgsql, pdo_mysql, json
        coverage: none

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Record PostgreSQL baseline
      run: DBDIFF_RECORD_MODE=true ./scripts/run-tests.sh --postgres 127.0.0.1

    - name: Verify PostgreSQL baseline determinism
      run: ./scripts/run-tests.sh --postgres 127.0.0.1

  # ── DSN URL integration tests (--server1-url / --server2-url) ──────────────
  test-dsn-urls:
    name: DSN URL / ${{ matrix.driver }} / PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { driver: mysql,  php-version: '8.3', db-image: 'mysql:8.4',    db-port: 3306, health-cmd: 'mysqladmin ping' }
          - { driver: pgsql,  php-version: '8.3', db-image: 'postgres:16',  db-port: 5432, health-cmd: 'pg_isready -U postgres' }

    services:
      db:
        image: ${{ matrix.db-image }}
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: diff1
          POSTGRES_PASSWORD: rootpass
          POSTGRES_USER: postgres
          POSTGRES_DB: diff1
        ports:
          - ${{ matrix.db-port }}:${{ matrix.db-port }}
        options: >-
          --health-cmd="${{ matrix.health-cmd }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: pdo, pdo_mysql, pdo_pgsql, pdo_sqlite, json
        coverage: none

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Test MySQL via DSN URL
      if: matrix.driver == 'mysql'
      run: |
        # Create the second test database and load fixtures
        mysql -h 127.0.0.1 -u root -prootpass -e "CREATE DATABASE diff2;"
        mysql -h 127.0.0.1 -u root -prootpass diff1 < tests/end2end/db1-up.sql
        mysql -h 127.0.0.1 -u root -prootpass diff2 < tests/end2end/db2-up.sql

        php dbdiff diff \
          --server1-url 'mysql://root:rootpass@127.0.0.1:3306/diff1' \
          --server2-url 'mysql://root:rootpass@127.0.0.1:3306/diff2' \
          --type=all --include=all --nocomments --output=/tmp/dsn-mysql.sql

        echo "--- MySQL DSN URL output ---"
        head -20 /tmp/dsn-mysql.sql
        test -s /tmp/dsn-mysql.sql || { echo 'FAIL: empty output'; exit 1; }

    - name: Test PostgreSQL via DSN URL
      if: matrix.driver == 'pgsql'
      run: |
        PGPASSWORD=rootpass psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE diff2;"
        PGPASSWORD=rootpass psql -h 127.0.0.1 -U postgres -d diff1 -f tests/end2end/db1-up-pgsql.sql
        PGPASSWORD=rootpass psql -h 127.0.0.1 -U postgres -d diff2 -f tests/end2end/db2-up-pgsql.sql

        php dbdiff diff \
          --server1-url 'postgres://postgres:rootpass@127.0.0.1:5432/diff1' \
          --server2-url 'postgres://postgres:rootpass@127.0.0.1:5432/diff2' \
          --type=all --include=all --nocomments --output=/tmp/dsn-pgsql.sql

        echo "--- PostgreSQL DSN URL output ---"
        head -20 /tmp/dsn-pgsql.sql
        test -s /tmp/dsn-pgsql.sql || { echo 'FAIL: empty output'; exit 1; }

    - name: Test SQLite via DSN URL
      run: |
        # Create two SQLite databases with differing schemas
        sqlite3 /tmp/v1.db <<'SQL'
          CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT NOT NULL);
          INSERT INTO users VALUES (1, 'Alice');
        SQL
        sqlite3 /tmp/v2.db <<'SQL'
          CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT NOT NULL, email TEXT);
          INSERT INTO users VALUES (1, 'Alice', 'alice@example.com');
        SQL

        php dbdiff diff \
          --server1-url 'sqlite:///tmp/v1.db' \
          --server2-url 'sqlite:///tmp/v2.db' \
          --type=all --include=all --nocomments --output=/tmp/dsn-sqlite.sql

        echo "--- SQLite DSN URL output ---"
        cat /tmp/dsn-sqlite.sql
        test -s /tmp/dsn-sqlite.sql || { echo 'FAIL: empty output'; exit 1; }
