      start_period: 40s

  # PHPMyAdmin services
  phpmyadmin-mysql80:
    depends_on:
      db-mysql80:
        condition: service_healthy
    image: docker.io/phpmyadmin/phpmyadmin:5.2
    restart: always
    ports:
      - ${PHPMYADMIN_PORT_MYSQL80}:80
    environment:
      PMA_HOST: db-mysql80
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

  phpmyadmin-mysql84:
    depends_on:
      db-mysql84:
        condition: service_healthy
    image: docker.io/phpmyadmin/phpmyadmin:5.2
    restart: always
    ports:
      - ${PHPMYADMIN_PORT_MYSQL84}:80
    environment:
      PMA_HOST: db-mysql84
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

