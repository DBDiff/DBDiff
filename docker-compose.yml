services:
  # PHP 8.3 services
  cli-php83-mysql80:
    depends_on:
      db-mysql80:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION_83}
    environment:
      - DB_HOST=db-mysql80
    volumes:
      - .:/usr/src/dbdiff
      - /usr/src/dbdiff/vendor
    command: tail -f /dev/null

  cli-php83-mysql84:
    depends_on:
      db-mysql84:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/Dockerfile
