        condition: service_healthy
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION_84}
    environment:
      - DB_HOST=db-mysql93
    volumes:
      - .:/usr/src/dbdiff
