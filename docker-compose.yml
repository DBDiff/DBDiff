      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

  phpmyadmin-mysql96:
    depends_on:
      db-mysql96:
        condition: service_healthy
    image: docker.io/phpmyadmin/phpmyadmin:5.2
    restart: always
