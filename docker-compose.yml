    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION_85}
    environment:
      - DB_HOST=db-mysql96
    volumes:
      - .:/usr/src/dbdiff
      - /usr/src/dbdiff/vendor
    command: tail -f /dev/null

  # Database services
  db-mysql80:
    image: docker.io/library/mysql:${MYSQL_VERSION_80}
    restart: always
    ports:
      - '${DB_PORT_MYSQL80}:3306'
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 5s
      start_period: 40s

  db-mysql84:
    image: docker.io/library/mysql:${MYSQL_VERSION_84}
    restart: always
    ports:
      - '${DB_PORT_MYSQL84}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 5s
      start_period: 40s

  db-mysql93:
    image: docker.io/library/mysql:${MYSQL_VERSION_93}
    restart: always
    ports:
      - '${DB_PORT_MYSQL93}:3306'
