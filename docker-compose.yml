    command: tail -f /dev/null

  cli-php84-mysql96:
    depends_on:
      db-mysql96:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION_84}
    environment:
