      - /usr/src/dbdiff/vendor
    command: tail -f /dev/null

  # PHP 8.5 services
  cli-php85-mysql80:
    depends_on:
      db-mysql80:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION_85}
    environment:
      - DB_HOST=db-mysql80
    volumes:
      - .:/usr/src/dbdiff
      - /usr/src/dbdiff/vendor
    command: tail -f /dev/null

  cli-php85-mysql84:
    depends_on:
      db-mysql84:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION_85}
    environment:
      - DB_HOST=db-mysql84
    volumes:
      - .:/usr/src/dbdiff
      - /usr/src/dbdiff/vendor
    command: tail -f /dev/null

  cli-php85-mysql93:
    depends_on:
      db-mysql93:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/Dockerfile
