    environment:
      - DB_HOST=db-mysql93
    volumes:
      - .:/usr/src/dbdiff
      - /usr/src/dbdiff/vendor
    command: tail -f /dev/null

  cli-php83-mysql96:
    depends_on:
      db-mysql96:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION_83}
    environment:
      - DB_HOST=db-mysql96
    volumes:
